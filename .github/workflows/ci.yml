name: CI

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: typecheck
        run: bun run typecheck
      - name: lint
        run: bun run lint
      - name: test
        run: bun run test
      - name: build
        run: bun run build
